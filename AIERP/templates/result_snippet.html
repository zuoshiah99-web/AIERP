<div class="card shadow-sm mb-4">
    <div class="card-header bg-dark text-white">產生的 SQL 語句</div>
    <div class="card-body"><code>{{ sql }}</code></div>
</div>

<div class="card shadow-sm">
    <div class="card-header d-flex justify-content-between align-items-center">
        查詢結果
        <a href="/download" class="btn btn-sm btn-success">轉出 Excel</a>
    </div>
    <div class="card-body table-responsive">
        {{ table_html | safe }}
        
        <div class="mt-3">
            <h5>📊 數值加總：</h5>
            {% for col, val in totals.items() %}
            <span class="badge bg-info text-dark me-2">{{ col }}: {{ val }}</span>
            {% endfor %}
        </div>
    </div>
</div>
