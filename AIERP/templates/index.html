<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Gemio ERP 查詢</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="mb-4">🚀 Gemio ERP 自然語言查詢</h2>
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form hx-post="/query" hx-target="#result" hx-indicator="#loading">
                    <div class="input-group">
                        <input type="text" name="user_input" class="form-control" placeholder="請輸入您的問題，例如：查詢採購明細表...">
                        <button class="btn btn-primary" type="submit">執行查詢</button>
                    </div>
                </form>
                <div id="loading" class="htmx-indicator mt-3 text-primary">
                    <div class="spinner-border spinner-border-sm"></div> 系統查詢中，請稍候...
                </div>
            </div>
        </div>
        <div id="result"></div> </div>
</body>
</html>
